services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: octavio_mendoza

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: octavio_mendoza
      CORS_ORIGINS: "*"
    ports:
      - "80:80"

volumes:
  mongo_data:
